<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harshavardhan | Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"/>

<style>
html { scroll-behavior: smooth; }
body { background:#050505; font-family: Inter, sans-serif; color: #fff; overflow-x: hidden; }

/* GRID */
.grid-overlay {
  position:fixed; inset:0; pointer-events:none;
  background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 90px 90px;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  z-index: 1000;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 14px 24px;

  background: rgba(10,10,10,0.6);
  backdrop-filter: blur(12px);

  border-top: 1px dotted rgba(255,255,255,0.15);
  border-bottom: 1px dotted rgba(255,255,255,0.15);

  transition: all 0.3s ease;
}

.navbar.scrolled {
  background: rgba(10,10,10,0.85);
  box-shadow: 0 6px 30px rgba(0,0,0,0.4);
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 28px;
}

.logo {
  font-weight: 700;
  border-right: 1px solid rgba(255,255,255,0.2);
  padding-right: 10px;
}

.nav-left a, .dropdown span {
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  font-size: 14px;
}

.nav-left a:hover { color: white; }

/* RIGHT */
.nav-right {
  display: flex;
  gap: 16px;
}

/* DROPDOWN */
.dropdown {
  position: relative;
}

.why-hire-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;

  width: 260px;
  padding: 14px;

  background: rgba(20,20,20,0.45);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;

  box-shadow: 0 10px 40px rgba(0,0,0,0.5);

  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;

  transition: all 0.25s ease;
}

.why-hire-dropdown.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* GRID */
.why-hire-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* CARDS */
.hire-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px;

  font-size: 11px;
  color: rgba(255,255,255,0.7);

  text-align: center;
  transition: all 0.25s ease;
}

.hire-card:hover {
  background: rgba(255,255,255,0.1);
  color: white;
  transform: translateY(-3px);
}

/* CARD */
.card {
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
}

/* TEXT */
.t-muted { color:#9ca3af; }
.t-subtle { color:#6b7280; }
.t-main { color:white; }

.dp-avatar {
  width:64px; height:64px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="grid-overlay"></div>

<!-- NAV -->
<nav class="navbar">
  <div class="nav-left">
    <div class="logo">GHV</div>
    <a href="#">Home</a>
    <a href="#">Projects</a>

    <div class="dropdown" id="whyBtn">
      <span>Why Hire Me ▾</span>

      <div class="why-hire-dropdown" id="whyDropdown">
        <div class="why-hire-grid">
          <div class="hire-card">Fast learner</div>
          <div class="hire-card">Ships real products</div>
          <div class="hire-card">Consistent growth</div>
          <div class="hire-card">Problem solver</div>
          <div class="hire-card">Self-driven</div>
        </div>
      </div>
    </div>

  </div>

  <div class="nav-right">
    🌙
  </div>
</nav>

<!-- MAIN -->
<main style="padding-top:80px;max-width:720px;margin:auto;padding:24px">

<div class="card" style="padding:24px;border-radius:16px">

  <div style="display:flex;gap:16px;align-items:center">
    <img src="images/dp.jpg" class="dp-avatar"/>
    <div>
      <h1 class="t-main">Gurram Harshavardhan ✔</h1>
      <p class="t-muted">Final-year CS student · Backend & Web Dev</p>
      <p class="t-subtle">Bangalore</p>
    </div>
  </div>

</div>

</main>

<script>
// scroll nav
window.addEventListener("scroll", () => {
  document.querySelector(".navbar")
    .classList.toggle("scrolled", window.scrollY > 20);
});

// dropdown hover
const btn = document.getElementById("whyBtn");
const drop = document.getElementById("whyDropdown");

btn.addEventListener("mouseenter", () => drop.classList.add("open"));
btn.addEventListener("mouseleave", () => drop.classList.remove("open"));
</script>

</body>
</html>
